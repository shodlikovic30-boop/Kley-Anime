<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KleyAnime — Твой аниме-портал</title>
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0a0b10; 
            --card: #161b22; 
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        /* ГЛАВНЫЙ ЭКРАН */
        .container { padding: 15px; max-width: 1000px; margin: 0 auto; }
        
        .logo { 
            text-align: center; 
            font-size: 24px; 
            font-weight: 900; 
            letter-spacing: 3px; 
            color: var(--accent); 
            margin-top: 20px;
            text-transform: uppercase;
        }

        .search-box { 
            display: flex; 
            gap: 10px; 
            margin: 25px 0; 
            background: var(--glass);
            padding: 5px;
            border-radius: 15px;
            border: 1px solid #222;
        }
        
        input { 
            flex: 1; 
            padding: 12px 15px; 
            border: none; 
            background: transparent; 
            color: white; 
            font-size: 16px; 
            outline: none; 
        }
        
        .btn { 
            background: var(--accent); 
            border: none; 
            padding: 0 20px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #000;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }
        
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
        }

        .card { 
            background: var(--card); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #222; 
            cursor: pointer; 
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .card:active { transform: scale(0.96); }
        .card:hover { border-color: var(--accent); }
        
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card p { 
            padding: 10px; 
            font-size: 0.85rem; 
            text-align: center; 
            margin: 0; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* ЭКРАН ПРОСМОТРА */
        #player-page { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 1000; 
            display: none; 
            flex-direction: column; 
        }

        .source-menu {
            display: flex; 
            gap: 10px; 
            padding: 12px; 
            background: #111;
            overflow-x: auto; 
            border-bottom: 1px solid #222;
            scrollbar-width: none; /* Firefox */
        }
        
        .source-menu::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .src-btn {
            background: #1a1a1a; 
            color: #ccc; 
            border: 1px solid #333;
            padding: 8px 16px; 
            border-radius: 10px; 
            white-space: nowrap; 
            font-size: 13px; 
            cursor: pointer;
            transition: 0.2s;
        }
        
        .src-btn.active { 
            background: var(--accent); 
            color: #000; 
            border-color: var(--accent);
            font-weight: bold;
        }

        .video-box { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .back-nav { 
            padding: 12px; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid #111;
        }
        
        .back-btn {
            background: #222; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 10px; 
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="search-page" class="container">
        <div class="logo">KLEY<span style="color:white">ANIME</span></div>
        
        <div class="search-box">
            <input type="text" id="q" placeholder="Поиск аниме...">
            <button class="btn" onclick="search()">Искать</button>
        </div>
        
        <h3 id="section-title" style="margin-bottom: 15px; font-size: 16px; opacity: 0.7;">Популярное сейчас:</h3>
        <div class="grid" id="results"></div>
    </div>

    <div id="player-page">
        <div class="back-nav">
            <button class="back-btn" onclick="closePlayer()">← Назад</button>
            <span id="cur-title" style="font-size: 13px; color: var(--accent); font-weight: bold; max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
            <div style="width: 20px;"></div>
        </div>

        <div class="source-menu">
            <div class="src-btn active" onclick="setSrc('kodik', this)">Общий плеер</div>
            <div class="src-btn" onclick="setSrc('anilibria', this)">AniLibria</div>
            <div class="src-btn" onclick="setSrc('anidap', this)">AniDap</div>
            <div class="src-btn" onclick="setSrc('anidub', this)">AniDub</div>
        </div>

        <div class="video-box">
            <iframe id="main-frame" src="" allowfullscreen></iframe>
        </div>
    </div>

<script>
    let currentAnime = "";

    // Поиск и загрузка топа
    async function search(isInitial = false) {
        const query = document.getElementById('q').value;
        const box = document.getElementById('results');
        const title = document.getElementById('section-title');
        
        let url = `https://shikimori.one/api/animes?limit=12&order=popularity`;
        
        if(!isInitial && query) {
            url = `https://shikimori.one/api/animes?search=${encodeURIComponent(query)}&limit=12`;
            title.innerText = "Результаты поиска:";
        }

        try {
            const res = await fetch(url);
            const data = await res.json();
            box.innerHTML = '';
            
            data.forEach(a => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openPlayer(a.russian || a.name);
                card.innerHTML = `
                    <img src="https://shikimori.one${a.image.original}" loading="lazy">
                    <p>${a.russian || a.name}</p>
                `;
                box.appendChild(card);
            });
        } catch (e) {
            box.innerHTML = '<p style="text-align:center; width:100%;">Ошибка загрузки. Проверьте интернет.</p>';
        }
    }

    function openPlayer(title) {
        currentAnime = title;
        document.body.style.overflow = 'hidden'; // Запрет скролла фона
        document.getElementById('search-page').style.display = 'none';
        document.getElementById('player-page').style.display = 'flex';
        document.getElementById('cur-title').innerText = title;
        setSrc('kodik', document.querySelector('.src-btn'));
    }

    function setSrc(type, btn) {
        document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const frame = document.getElementById('main-frame');
        const title = encodeURIComponent(currentAnime);

        // Фильтры озвучек через Kodik
        const base = `https://portal.kodik-cdn.com/find?title=${title}`;
        
        if (type === 'kodik') frame.src = base;
        else if (type === 'anilibria') frame.src = `${base}&only_translations=609`;
        else if (type === 'anidap') frame.src = `${base}&only_translations=645`;
        else if (type === 'anidub') frame.src = `${base}&only_translations=1`;
    }

    function closePlayer() {
        document.body.style.overflow = 'auto';
        document.getElementById('search-page').style.display = 'block';
        document.getElementById('player-page').style.display = 'none';
        document.getElementById('main-frame').src = '';
    }

    // Загрузка при старте
    search(true); 
</script>
</body>
</html>
