<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KleyAnime OS</title>
    <style>
        :root { 
            --accent: #f8e71c; 
            --bg: #0b0c10; 
            --card: #16171d; 
            --text: #ffffff; 
            --gray: #949ba2; 
            --neon: #00efff;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding-bottom: 75px; 
            overflow-x: hidden; 
        }

        /* Поиск */
        .search-container { 
            display: flex; 
            background: #1a1c23; 
            border-radius: 12px; 
            padding: 5px 15px; 
            margin: 15px; 
            align-items: center; 
            border: 1px solid #333; 
        }
        .search-container input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #fff; 
            padding: 10px; 
            outline: none; 
            font-size: 16px; 
        }

        /* Сетка аниме */
        #anime-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .anime-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
            border: 1px solid #333;
            cursor: pointer;
        }

        .anime-card:hover {
            transform: scale(1.05);
            border-color: var(--neon);
        }

        .anime-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .anime-title {
            padding: 8px;
            font-size: 14px;
            text-align: center;
            color: #eee;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Плеер (Модальное окно) */
        #player-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #player-container {
            width: 90%;
            max-width: 800px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--neon);
            box-shadow: 0 0 20px var(--neon);
        }

        iframe {
            width: 100%;
            height: 450px;
            border: none;
        }

        .close-btn {
            margin-top: 20px;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Поиск аниме...">
        <span class="search-btn">🔍</span>
    </div>

    <div id="anime-list">
        </div>

    <div id="player-modal">
        <div id="player-container">
            <p style="text-align: center; padding: 20px;">Загрузка плеера...</p>
        </div>
        <button class="close-btn" onclick="closePlayer()">Закрыть</button>
    </div>

    <script>
        // Список ID аниме (замени на свой полный список)
        const animeIds = ["1", "100", "10012", "10014", "1002", "30", "16498"]; 

        const container = document.getElementById('anime-list');

        // Функция загрузки карточек
        async function loadCards() {
            // Берем первые 30 штук для примера
            const limitedIds = animeIds.slice(0, 30);

            for (const id of limitedIds) {
                try {
                    const response = await fetch(`https://shikimori.one/api/animes/${id}`);
                    const data = await response.json();

                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.onclick = () => openPlayer(data.id);

                    card.innerHTML = `
                        <img src="https://shikimori.one${data.image.preview}" alt="${data.name}">
                        <div class="anime-title">${data.russian || data.name}</div>
                    `;
                    container.appendChild(card);
                } catch (err) {
                    console.error(`Ошибка ID ${id}:`, err);
                }
            }
        }

        // Функция открытия плеера (используем voidboost или другой embed)
        function openPlayer(id) {
            const modal = document.getElementById('player-modal');
            const container = document.getElementById('player-container');
            
            modal.style.display = 'flex';
            
            // Используем стандартную ссылку для встраивания (пример)
            // Внимание: voidboost может требовать специфические домены
            container.innerHTML = `
                <iframe 
                    src="https://voidboost.net/embed/anime/${id}" 
                    allowfullscreen>
                </iframe>`;
        }

        function closePlayer() {
            const modal = document.getElementById('player-modal');
            const container = document.getElementById('player-container');
            modal.style.display = 'none';
            container.innerHTML = ''; // Очищаем, чтобы видео перестало играть
        }

        // Запуск
        loadCards();
    </script>
</body>
</html>
