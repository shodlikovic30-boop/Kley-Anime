<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YORU ANIME — Высший Портал</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020204; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020204; }
        ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4338ca; }
    </style>
</head>
<body class="text-gray-100 antialiased selection:bg-indigo-600/40 selection:text-indigo-200">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function UltimateAnimePortal() {
            const [animeList, setAnimeList] = useState([]);
            const [popularList, setPopularList] = useState([]); 
            const [searchQuery, setSearchQuery] = useState('');
            const [loading, setLoading] = useState(true);
            const [selectedAnime, setSelectedAnime] = useState(null);

            // Используем публичный CORS-прокси для обхода блокировок GitHub Pages
            const PROXY = 'https://cors-anywhere.herokuapp.com/';
            const API_BASE = 'https://api.anilibria.tv/v3';
            const CDN_BASE = 'https://www.anilibria.tv';

            // Функция для безопасных запросов через прокси (если обычный падает по CORS)
            const proxyFetch = (url) => {
                return fetch(url).catch(() => fetch(PROXY + url)).then(res => res.json());
            };

            // Инициализация контента
            useEffect(() => {
                setLoading(true);
                
                // Запрашиваем последние обновления
                proxyFetch(`${API_BASE}/title/updates?limit=25`)
                    .then(data => {
                        setAnimeList(data || []);
                        
                        // Сортируем полученные тайтлы по просмотрам
                        const sortedByViews = [...data].sort((a, b) => {
                            const viewsA = a.player?.views || 0;
                            const viewsB = b.player?.views || 0;
                            return viewsB - viewsA;
                        });
                        setPopularList(sortedByViews.slice(0, 4));
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('Ошибка сети:', err);
                        setLoading(false);
                    });
            }, []);

            // Живой поиск
            const handleSearch = (e) => {
                if (e) e.preventDefault();
                if (!searchQuery.trim()) {
                    setLoading(true);
                    proxyFetch(`${API_BASE}/title/updates?limit=20`).then(data => { setAnimeList(data); setLoading(false); });
                    return;
                }
                setLoading(true);
                proxyFetch(`${API_BASE}/title/search?search=${encodeURIComponent(searchQuery)}&limit=20`)
                    .then(data => {
                        setAnimeList(data);
                        setLoading(false);
                        document.getElementById('catalog-grid')?.scrollIntoView({ behavior: 'smooth' });
                    })
                    .catch(() => setLoading(false));
            };

            return (
                <div class="min-h-screen relative overflow-x-hidden pb-20">
                    
                    {/* Мягкий фоновый неоновый свет */}
                    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
                        <div class="absolute -top-40 left-1/4 w-[700px] h-[700px] bg-indigo-950/20 blur-[150px] rounded-full"></div>
                        <div class="absolute top-[30%] right-10 w-[500px] h-[500px] bg-purple-950/10 blur-[130px] rounded-full"></div>
                    </div>

                    <header class="sticky top-0 z-50 border-b border-white/[0.03] bg-[#020204]/70 backdrop-blur-xl">
                        <div class="max-w-7xl mx-auto px-4 sm:px-8 h-20 flex items-center justify-between gap-4">
                            
                            <div class="flex items-center gap-3 cursor-pointer" onClick={() => { setSearchQuery(''); setSelectedAnime(null); }}>
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-purple-600 shadow-[0_0_25px_rgba(79,70,229,0.4)] flex items-center justify-center text-lg font-black text-white">
                                    夜
                                </div>
                                <div class="hidden xs:block">
                                    <h1 class="text-base font-black tracking-widest text-white">YORU ANIME</h1>
                                    <p class="text-[9px] text-gray-500 font-bold tracking-wider uppercase">Atmospheric Portal</p>
                                </div>
                            </div>

                            {/* Поисковая система */}
                            <form onSubmit={handleSearch} class="relative flex-1 max-w-md">
                                <input
                                    type="text"
                                    placeholder="Найти аниме по названию..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    class="w-full bg-[#09090f] border border-white/[0.05] focus:border-indigo-500/50 rounded-xl pl-4 pr-10 py-2.5 text-sm text-gray-200 placeholder-gray-500 outline-none transition-all"
                                />
                                <button type="submit" class="absolute right-3 top-3 text-gray-400 hover:text-indigo-400 transition-colors">
                                    🔍
                                </button>
                            </form>
                        </div>
                    </header>

                    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-8 py-8 space-y-16">
                        
                        {/* ЖИВОЙ ПЛЕЕР через Iframe */}
                        {selectedAnime && (
                            <section class="bg-[#07070c] border border-white/[0.04] rounded-3xl overflow-hidden shadow-[0_30px_70px_rgba(0,0,0,0.8)] animate-fadeIn">
                                <div class="grid lg:grid-cols-12">
                                    
                                    <div class="lg:col-span-8 bg-black aspect-video relative border-b lg:border-b-0 lg:border-r border-white/[0.05]">
                                        <iframe 
                                            src={`https://www.anilibria.tv/public/iframe.php?id=${selectedAnime.id}`}
                                            class="absolute inset-0 w-full h-full border-0"
                                            allowfullscreen="true"
                                            allow="autoplay; encrypted-media"
                                        ></iframe>
                                    </div>

                                    <div class="lg:col-span-4 p-6 flex flex-col justify-between bg-[#090911]/60 h-[350px] lg:h-auto overflow-y-auto">
                                        <div class="space-y-4">
                                            <div class="flex justify-between items-start gap-4">
                                                <div>
                                                    <span class="px-2 py-0.5 text-[9px] font-bold text-indigo-300 bg-indigo-500/10 border border-indigo-500/20 rounded uppercase tracking-wider">
                                                        Кинозал
                                                    </span>
                                                    <h3 class="text-lg font-bold text-white mt-1.5">{selectedAnime.names.ru}</h3>
                                                </div>
                                                <button onClick={() => setSelectedAnime(null)} class="text-gray-500 hover:text-white text-sm bg-white/5 w-7 h-7 rounded-full flex items-center justify-center transition">✕</button>
                                            </div>
                                            <p class="text-gray-400 text-xs font-light leading-relaxed line-clamp-6">
                                                {selectedAnime.description || 'Описание отсутствует.'}
                                            </p>
                                        </div>

                                        <div class="border-t border-white/[0.04] pt-4 grid grid-cols-2 gap-2 text-[11px] text-gray-500">
                                            <div>Год: <span class="text-gray-300 font-medium">{selectedAnime.season?.year || '—'}</span></div>
                                            <div>Статус: <span class="text-indigo-400 font-medium">{selectedAnime.status?.string || 'Выходит'}</span></div>
                                            <div class="col-span-2 truncate">Голоса: <span class="text-gray-400">{selectedAnime.voices ? selectedAnime.voices.join(', ') : 'Anilibria'}</span></div>
                                        </div>
                                    </div>

                                </div>
                            </section>
                        )}

                        {/* СЕКЦИЯ: ПОПУЛЯРНОЕ */}
                        {!searchQuery && popularList.length > 0 && (
                            <section class="space-y-4">
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></div>
                                    <h2 class="text-xs font-black tracking-widest uppercase text-indigo-400">Популярно сейчас</h2>
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                                    {popularList.map((anime) => {
                                        const poster = anime.posters?.original?.url ? `${CDN_BASE}${anime.posters.original.url}` : 'https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1200';
                                        return (
                                            <div 
                                                key={anime.id} 
                                                onClick={() => { setSelectedAnime(anime); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                                                class="group relative h-44 rounded-2xl overflow-hidden border border-white/[0.03] bg-[#090910] cursor-pointer hover:border-indigo-500/30 transition-all duration-300"
                                            >
                                                <img src={poster} class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-105 transition-all duration-500" />
                                                <div class="absolute inset-0 bg-gradient-to-t from-[#020204] via-[#020204]/40 to-transparent" />
                                                <div class="absolute bottom-0 p-4 w-full">
                                                    <h3 class="text-xs font-bold text-white group-hover:text-indigo-400 transition-colors truncate">{anime.names.ru}</h3>
                                                    <p class="text-[10px] text-gray-500 truncate mt-0.5">{anime.genres ? anime.genres.slice(0, 2).join(' • ') : 'Аниме'}</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        )}

                        {/* ГЛАВНЫЙ КАТАЛОГ */}
                        <section id="catalog-grid" class="space-y-6">
                            <div class="flex justify-between items-end border-b border-white/[0.03] pb-4">
                                <div>
                                    <h2 class="text-lg font-extrabold text-white">
                                        {searchQuery ? `Результаты поиска` : 'Лента обновлений'}
                                    </h2>
                                    <p class="text-xs text-gray-500 mt-0.5">Все последние серии, добавленные на сервера</p>
                                </div>
                            </div>

                            {loading ? (
                                <div class="flex flex-col justify-center items-center py-32 space-y-3">
                                    <div class="w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                                    <p class="text-[10px] text-gray-600 uppercase tracking-widest">Загрузка базы данных...</p>
                                </div>
                            ) : animeList.length > 0 ? (
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
                                    {animeList.map((anime) => {
                                        const posterUrl = anime.posters?.original?.url ? `${CDN_BASE}${anime.posters.original.url}` : 'https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1200';
                                        return (
                                            <div key={anime.id} onClick={() => { setSelectedAnime(anime); window.scrollTo({ top: 0, behavior: 'smooth' }); }} class="group bg-[#090910]/40 border border-white/[0.03] rounded-2xl overflow-hidden cursor-pointer hover:border-indigo-500/30 transition-all duration-500 hover:-translate-y-0.5">
                                                <div class="relative aspect-[3/4] overflow-hidden bg-gray-950">
                                                    <img src={posterUrl} class="w-full h-full object-cover group-hover:scale-103 transition-transform duration-500" loading="lazy" />
                                                    <div class="absolute inset-0 bg-gradient-to-t from-[#020204] to-transparent opacity-90" />
                                                    <div class="absolute bottom-3 left-3 bg-indigo-600/90 text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm">
                                                        Серия {anime.player?.series?.last || 1}
                                                    </div>
                                                </div>
                                                <div class="p-3.5">
                                                    <h3 class="text-xs font-bold text-gray-200 group-hover:text-indigo-400 transition-colors truncate">{anime.names.ru}</h3>
                                                    <p class="text-[10px] text-gray-500 truncate mt-0.5">{anime.genres ? anime.genres.join(' • ') : 'Аниме'}</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div class="text-center py-20 border border-dashed border-white/[0.04] rounded-2xl bg-[#090910]/10">
                                    <p class="text-gray-500 text-xs">Ничего не найдено.</p>
                                </div>
                            )}
                        </section>
                    </main>

                    <footer class="mt-20 border-t border-white/[0.02] pt-8 text-center text-[10px] text-gray-600 tracking-wider">
                        <p>© 2026 YORU ANIME Hub. Синхронизировано через фрейм-систему Anilibria v3.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UltimateAnimePortal />);
    </script>
</body>
</html>
